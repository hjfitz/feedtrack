<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="robots" content="noindex">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/apple-icon.png">
    <title>FeedTrack</title>
    <style>
      :root {
        color-scheme: dark;
        --background: #161616;
        --foreground: #fafafa;
        --muted: #2d2d2d;
        --muted-soft: rgb(45 45 45 / 0.5);
        --muted-softer: rgb(45 45 45 / 0.32);
        --border: #3a3a3a;
        --muted-foreground: #a1a1a1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--background);
        color: var(--foreground);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .shell {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
      }

      header {
        flex: none;
        padding: calc(3rem + env(safe-area-inset-top, 0px)) 1rem 1rem;
      }

      .header-inner,
      main {
        width: 100%;
        max-width: 1600px;
        margin: 0 auto;
      }

      .title {
        width: min(13rem, 58vw);
        height: 1.9rem;
      }

      .subtitle {
        width: min(10rem, 48vw);
        height: 0.875rem;
        margin-top: 0.65rem;
      }

      main {
        flex: 1;
        padding: 0 1rem 6rem;
      }

      .content {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.75rem;
      }

      .stat,
      .panel {
        border: 1px solid var(--border);
        background: var(--muted-softer);
      }

      .stat {
        min-height: 6.5rem;
        border-radius: 1rem;
        padding: 1rem;
      }

      .panel {
        border-radius: 1rem;
        padding: 1rem;
      }

      .center-line {
        margin-right: auto;
        margin-left: auto;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.75rem;
      }

      .tile {
        height: 5rem;
        border-radius: 1rem;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .rule {
        height: 1px;
        flex: 1;
        background: var(--border);
      }

      .skel {
        position: relative;
        overflow: hidden;
        border-radius: 999px;
        background: var(--muted);
      }

      .skel::after {
        position: absolute;
        inset: 0;
        content: "";
        transform: translateX(-100%);
        background: linear-gradient(90deg, transparent, rgb(255 255 255 / 0.08), transparent);
        animation: shimmer 1.35s infinite;
      }

      .bottom-nav {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.5rem;
        border-top: 1px solid var(--border);
        background: rgb(22 22 22 / 0.94);
        padding: 0.75rem 1rem calc(0.75rem + env(safe-area-inset-bottom, 0px));
        backdrop-filter: blur(16px);
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
      }

      .nav-dot {
        width: 1.25rem;
        height: 1.25rem;
      }

      .nav-label {
        width: 2.75rem;
        height: 0.55rem;
      }

      @keyframes shimmer {
        100% {
          transform: translateX(100%);
        }
      }

      @media (min-width: 1024px) {
        header {
          border-bottom: 1px solid var(--border);
          padding: 1.5rem 2rem 1rem;
        }

        .header-inner {
          display: flex;
          align-items: flex-start;
          justify-content: space-between;
          gap: 1.5rem;
        }

        main {
          padding: 1.5rem 2rem;
        }

        .bottom-nav {
          display: none;
        }

        .desktop-nav {
          display: flex;
          gap: 0.5rem;
          border: 1px solid var(--border);
          border-radius: 0.75rem;
          padding: 0.35rem;
          background: var(--muted-softer);
        }

        .desktop-pill {
          width: 5.5rem;
          height: 2.5rem;
          border-radius: 0.55rem;
        }
      }

      @media (max-width: 1023px) {
        .desktop-nav {
          display: none;
        }
      }
    </style>
    <script>
      window.addEventListener('load', function () {
        if (!navigator.onLine) return

        window.setTimeout(function () {
          window.location.reload()
        }, 1800)
      })
    </script>
  </head>
  <body>
    <div class="shell" aria-busy="true" aria-label="FeedTrack is loading">
      <header>
        <div class="header-inner">
          <div>
            <div class="skel title"></div>
            <div class="skel subtitle"></div>
          </div>
          <nav class="desktop-nav" aria-hidden="true">
            <div class="skel desktop-pill"></div>
            <div class="skel desktop-pill"></div>
            <div class="skel desktop-pill"></div>
            <div class="skel desktop-pill"></div>
          </nav>
        </div>
      </header>
      <main>
        <div class="content">
          <div class="stats">
            <section class="stat">
              <div class="skel center-line" style="width: 5rem; height: 0.75rem;"></div>
              <div class="skel center-line" style="width: 6rem; height: 2rem; margin-top: 0.75rem;"></div>
              <div class="skel center-line" style="width: 4rem; height: 1rem; margin-top: 0.5rem;"></div>
            </section>
            <section class="stat">
              <div class="skel center-line" style="width: 5rem; height: 0.75rem;"></div>
              <div class="skel center-line" style="width: 6rem; height: 2rem; margin-top: 0.75rem;"></div>
              <div class="skel center-line" style="width: 4rem; height: 1rem; margin-top: 0.5rem;"></div>
            </section>
          </div>

          <section class="panel">
            <div class="skel" style="width: 3.5rem; height: 0.75rem;"></div>
            <div class="grid" style="margin-top: 0.75rem;">
              <div class="skel tile"></div>
              <div class="skel tile"></div>
              <div class="skel tile"></div>
            </div>
          </section>

          <section class="content" style="gap: 0.75rem;">
            <div class="row">
              <div class="rule"></div>
              <div class="skel" style="width: 2.25rem; height: 0.75rem;"></div>
              <div class="rule"></div>
            </div>
            <div class="skel" style="width: 3rem; height: 0.75rem;"></div>
            <div class="grid">
              <div class="skel tile"></div>
              <div class="skel tile"></div>
              <div class="skel tile"></div>
            </div>
            <div class="skel" style="width: 4rem; height: 0.75rem;"></div>
            <div class="grid">
              <div class="skel tile"></div>
              <div class="skel tile"></div>
              <div class="skel tile"></div>
            </div>
          </section>
        </div>
      </main>
      <nav class="bottom-nav" aria-hidden="true">
        <div class="nav-item">
          <div class="skel nav-dot"></div>
          <div class="skel nav-label"></div>
        </div>
        <div class="nav-item">
          <div class="skel nav-dot"></div>
          <div class="skel nav-label"></div>
        </div>
        <div class="nav-item">
          <div class="skel nav-dot"></div>
          <div class="skel nav-label"></div>
        </div>
        <div class="nav-item">
          <div class="skel nav-dot"></div>
          <div class="skel nav-label"></div>
        </div>
      </nav>
    </div>
  </body>
</html>
